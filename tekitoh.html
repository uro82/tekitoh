<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
#overlay {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
}

#box {
  text-align: center;
  font-size: 20px;
  padding: 20px;
}

button {
  margin-top: 20px;
  padding: 8px 20px;
  font-size: 16px;
}

.fade {
  opacity: 0;
  transition: opacity 1.5s;
}

.show {
  opacity: 1;
}
</style>
</head>

<body>

<div id="overlay">
  <div id="box">
    <div id="text" class="fade"></div>
    <button onclick="next()">了解</button>
  </div>
</div>

<script>
const messages = [
  "悔しかったら、チケット当ててから言ってください",
  "外れた人残念～w",
  "俺は仙台楽しんできまーすw"
];

let index = 0;

function showText() {
  const text = document.getElementById("text");
  text.classList.remove("show");
  
  setTimeout(() => {
    text.innerText = messages[index];
    text.classList.add("show");
  }, 300);
}

function next() {
  index++;
  
  if (index >= messages.length) {
    document.getElementById("overlay").style.display = "none";
    return;
  }
  
  showText();
}

// 初回表示
showText();
</script>

</body>
</html>
